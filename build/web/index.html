<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Gerald is Watching | Neighborhood Watch</title>
  <meta name="description" content="Gerald lives in a neighborhood with 0% crime, but that doesn't stop him from reporting suspicious activity. A paranoid suburban surveillance game.">
  <meta name="theme-color" content="#0a0a0a">

  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gerald is Watching">
  <meta property="og:description" content="The neighborhood isn't going to watch itself. A paranoid suburban surveillance game built for Flame Game Jam.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:url" content="https://gerald-208.pages.dev/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gerald is Watching">
  <meta name="twitter:description" content="The neighborhood isn't going to watch itself.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gerald is Watching">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts: VT323 (VCR/CRT style) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: 'VT323', monospace; }

    .crt-scanlines {
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255, 170, 0, 0.03) 2px, rgba(255, 170, 0, 0.03) 4px
      );
      pointer-events: none;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.85; }
      94% { opacity: 1; }
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,170,0,0.4), inset 0 0 20px rgba(255,170,0,0.1); }
      50% { box-shadow: 0 0 40px rgba(255,170,0,0.7), inset 0 0 30px rgba(255,170,0,0.2); }
    }

    @keyframes rec-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .glow-btn {
      animation: glow-pulse 2s ease-in-out infinite;
      cursor: pointer;
      font-family: 'VT323', monospace;
    }

    .rec-dot { animation: rec-blink 1s step-end infinite; }

    #game-container {
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loading-text {
      font-family: 'VT323', monospace;
      color: #FFAA00;
      font-size: 24px;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <!-- ===== LANDING PAGE ===== -->
  <div id="landing" style="position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 16px; animation:flicker 4s infinite;">

    <!-- Scanline overlay -->
    <div class="crt-scanlines" style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:10;"></div>

    <!-- Content -->
    <div style="position:relative; z-index:20; max-width:32rem; width:100%; text-align:center; display:flex; flex-direction:column; gap:32px; align-items:center;">

      <!-- REC indicator -->
      <div style="display:flex; align-items:center; gap:8px; color:#ef4444; font-size:14px; position:absolute; top:-40px; left:0;">
        <span class="rec-dot" style="display:inline-block; width:12px; height:12px; background:#dc2626; border-radius:50%;"></span>
        <span style="letter-spacing:0.15em;">REC</span>
      </div>

      <!-- Title -->
      <div>
        <h1 style="color:#FFAA00; font-size:clamp(3rem,10vw,4.5rem); letter-spacing:0.1em; line-height:1; margin-bottom:12px;">
          GERALD IS<br>WATCHING
        </h1>
        <p style="color:#996600; font-size:clamp(1.1rem,3vw,1.3rem); font-style:italic;">
          The neighborhood isn't going to watch itself.
        </p>
      </div>

      <!-- Play Button -->
      <button onclick="startGame()" class="glow-btn" style="width:100%; padding:20px 0; border-radius:8px; font-size:clamp(1.5rem,5vw,2.2rem); letter-spacing:0.15em; background:rgba(255,170,0,0.15); border:2px solid #FFAA00; color:#FFCC44;">
        &#9658; BEGIN SURVEILLANCE
      </button>

      <!-- Links -->
      <div style="display:flex; align-items:center; justify-content:center; gap:24px; font-size:14px; color:#664400;">
        <a href="https://github.com/layogtima/gerald" target="_blank" style="color:#996600; text-decoration:none;">
          [ GitHub ]
        </a>
        <span>|</span>
        <span>Flame Game Jam 2025</span>
      </div>

      <!-- VCR timestamp -->
      <div style="font-size:12px; letter-spacing:0.15em; color:#443300;" id="vcr-clock"></div>
    </div>
  </div>

  <!-- ===== GAME CONTAINER ===== -->
  <div id="game-container" style="display: none;">
    <div id="loading-text">INITIALIZING SURVEILLANCE...</div>
  </div>

  <!-- Load Flutter loader (not bootstrap) so we control initialization -->
  <script src="flutter.js" defer></script>
  <script>
    // VCR clock on landing page
    function updateClock() {
      const now = new Date();
      const d = now.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '.');
      const t = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const el = document.getElementById('vcr-clock');
      if (el) el.textContent = d + '  ' + t;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Start game: show container, fetch buildConfig from flutter_bootstrap.js, then init Flutter
    function startGame() {
      document.getElementById('landing').style.display = 'none';
      var gc = document.getElementById('game-container');
      gc.style.display = 'flex';

      fetch('flutter_bootstrap.js').then(function(r) { return r.text(); }).then(function(src) {
        var match = src.match(/_flutter\.buildConfig\s*=\s*(\{.*?\});/);
        if (match) {
          _flutter.buildConfig = JSON.parse(match[1]);
        }
        _flutter.loader.load({
          onEntrypointLoaded: async function(engineInitializer) {
            document.getElementById('loading-text')?.remove();
            var appRunner = await engineInitializer.initializeEngine({
              hostElement: gc,
            });
            await appRunner.runApp();
          }
        });
      });
    }
  </script>
</body>
</html>
