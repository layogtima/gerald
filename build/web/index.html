<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Gerald is Watching | Neighborhood Watch</title>
  <meta name="description" content="Gerald lives in a neighborhood with 0% crime, but that doesn't stop him from reporting suspicious activity. A paranoid suburban surveillance game.">
  <meta name="theme-color" content="#0a0a0a">

  <!-- OpenGraph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gerald is Watching">
  <meta property="og:description" content="The neighborhood isn't going to watch itself. A paranoid suburban surveillance game built for Flame Game Jam.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:url" content="https://gerald-208.pages.dev/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gerald is Watching">
  <meta name="twitter:description" content="The neighborhood isn't going to watch itself.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gerald is Watching">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts: VT323 (VCR/CRT style) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }

    .vt323 { font-family: 'VT323', monospace; }

    /* CRT scanline effect for landing page */
    .crt-scanlines {
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 170, 0, 0.03) 2px,
        rgba(255, 170, 0, 0.03) 4px
      );
      pointer-events: none;
    }

    /* CRT flicker */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.85; }
      94% { opacity: 1; }
    }

    /* Glow pulse for the play button */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 170, 0, 0.4), inset 0 0 20px rgba(255, 170, 0, 0.1); }
      50% { box-shadow: 0 0 40px rgba(255, 170, 0, 0.7), inset 0 0 30px rgba(255, 170, 0, 0.2); }
    }

    /* REC blink */
    @keyframes rec-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .glow-btn {
      animation: glow-pulse 2s ease-in-out infinite;
      cursor: pointer;
    }

    .rec-dot {
      animation: rec-blink 1s step-end infinite;
    }

    #game-container {
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loading-text {
      font-family: 'VT323', monospace;
      color: #FFAA00;
      font-size: 24px;
      letter-spacing: 4px;
    }
  </style>
</head>
<body class="bg-black vt323">

  <!-- ===== LANDING PAGE ===== -->
  <div id="landing" class="relative min-h-screen flex flex-col items-center justify-center px-4" style="animation: flicker 4s infinite;">

    <!-- Scanline overlay -->
    <div class="crt-scanlines fixed inset-0 z-10"></div>

    <!-- Content -->
    <div class="relative z-20 max-w-lg w-full text-center space-y-8">

      <!-- REC indicator -->
      <div class="flex items-center justify-start gap-2 text-red-500 text-sm absolute top-4 left-4 sm:top-8 sm:left-8">
        <span class="rec-dot inline-block w-3 h-3 bg-red-600 rounded-full"></span>
        <span class="tracking-widest">REC</span>
      </div>

      <!-- Title -->
      <div class="space-y-3">
        <h1 class="text-5xl sm:text-7xl tracking-wider leading-none" style="color: #FFAA00;">
          GERALD IS<br>WATCHING
        </h1>
        <p class="text-lg sm:text-xl italic" style="color: #996600;">
          The neighborhood isn't going to watch itself.
        </p>
      </div>

      <!-- Play Button -->
      <button onclick="startGame()" class="glow-btn w-full py-5 rounded-lg text-3xl sm:text-4xl tracking-widest transition-colors" style="background: rgba(255,170,0,0.15); border: 2px solid #FFAA00; color: #FFCC44;">
        &#9658; BEGIN SURVEILLANCE
      </button>

      <!-- Links -->
      <div class="flex items-center justify-center gap-6 text-sm" style="color: #664400;">
        <a href="https://github.com/layogtima/gerald" target="_blank" class="hover:opacity-80 transition-opacity" style="color: #996600;">
          [ GitHub ]
        </a>
        <span>|</span>
        <span>Flame Game Jam 2025</span>
      </div>

      <!-- VCR timestamp -->
      <div class="text-xs tracking-widest" style="color: #443300;" id="vcr-clock"></div>
    </div>
  </div>

  <!-- ===== GAME CONTAINER ===== -->
  <div id="game-container" style="display: none;">
    <div id="loading-text">INITIALIZING SURVEILLANCE...</div>
  </div>

  <!-- Load Flutter loader (not bootstrap) so we control initialization -->
  <script src="flutter.js" defer></script>
  <script>
    // VCR clock on landing page
    function updateClock() {
      const now = new Date();
      const d = now.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '.');
      const t = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const el = document.getElementById('vcr-clock');
      if (el) el.textContent = d + '  ' + t;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Start game: show container, fetch buildConfig from flutter_bootstrap.js, then init Flutter
    function startGame() {
      document.getElementById('landing').style.display = 'none';
      var gc = document.getElementById('game-container');
      gc.style.display = 'flex';

      // Fetch flutter_bootstrap.js as text to extract buildConfig
      fetch('flutter_bootstrap.js').then(function(r) { return r.text(); }).then(function(src) {
        // Extract buildConfig JSON from the bootstrap source
        var match = src.match(/_flutter\.buildConfig\s*=\s*(\{.*?\});/);
        if (match) {
          _flutter.buildConfig = JSON.parse(match[1]);
        }
        // Now load with our custom hostElement
        _flutter.loader.load({
          onEntrypointLoaded: async function(engineInitializer) {
            document.getElementById('loading-text')?.remove();
            var appRunner = await engineInitializer.initializeEngine({
              hostElement: gc,
            });
            await appRunner.runApp();
          }
        });
      });
    }
  </script>
</body>
</html>
